version: 1
applications:
  - appRoot: .             # your package.json is here
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci                # install dependencies at root
        build:
          commands:
            - npm run build        # outputs into ./build
      artifacts:
        # <-- point at the CRA build output
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
