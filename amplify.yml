version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci          # install dependencies
        build:
          commands:
            - npm run build  # produce the build folder
      artifacts:
        # <-- this must match your build output directory
        baseDirectory: build
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
