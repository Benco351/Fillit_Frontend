version: 1
applications:
  - appRoot: my-app
    frontend:
      phases:
        preBuild:
          commands:
            - nvm install 20
            - nvm use 20
            - node -v
            - npm ci
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: my-app/build
        files:
          - '**/*'
      cache:
        paths:
          - my-app/node_modules/**/*
